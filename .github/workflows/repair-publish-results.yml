name: repair publish cluster results

on:
  workflow_run:
    workflows:
      - repair cluster worker
    types:
      - completed

permissions:
  contents: write
  actions: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093

concurrency:
  group: clawsweeper-repair-publish-results
  cancel-in-progress: false

jobs:
  publish:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ vars.CLAWSWEEPER_ALLOWED_OWNER || github.repository_owner }}
          permission-actions: read
          permission-contents: write
          permission-pull-requests: read

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - uses: ./.github/actions/setup-pnpm
        with:
          build-script: build:repair

      - name: Download worker artifacts
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
        run: |
          set -euo pipefail
          rm -rf artifacts
          mkdir -p artifacts
          final_artifact="clawsweeper-repair-${RUN_ID}-${RUN_ATTEMPT:-1}"
          if gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" --name "$final_artifact" --dir artifacts; then
            exit 0
          fi
          gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" --dir artifacts
          find artifacts -type d -name 'clawsweeper-repair-worker-*' -prune -exec rm -rf {} +

      - name: Publish and commit result ledger
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout -B main origin/main
          pnpm run repair:publish-result -- artifacts \
            --run-id "$RUN_ID" \
            --run-url "$RUN_URL" \
            --head-sha "$HEAD_SHA" \
            --conclusion "$CONCLUSION"
          pnpm run repair:finalize-open-prs -- --write-report
          pnpm run repair:publish-result
          git add docs/repair/README.md results jobs/openclaw/closed repair-apply-report.json
          if git diff --cached --quiet; then
            echo "No result changes"
            exit 0
          fi
          git commit -m "chore: publish cluster result"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed; rebasing existing ledger commit onto origin/main"
            git fetch origin main
            if git rebase origin/main; then
              continue
            fi
            git rebase --abort || true
            exit 1
          done
          exit 1
