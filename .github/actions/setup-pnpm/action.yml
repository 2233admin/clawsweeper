name: Setup pnpm workspace
description: Setup Node, install pnpm dependencies, and optionally run a build script.
inputs:
  node-version:
    description: Node.js version.
    default: "latest"
  working-directory:
    description: Directory containing package.json.
    default: "."
  build-script:
    description: Optional pnpm script to run after install.
    default: ""
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable corepack
      shell: bash
      run: corepack enable

    - name: Locate pnpm store
      id: pnpm-store
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Cache pnpm store
      uses: actions/cache@v5
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-node-${{ inputs.node-version }}-pnpm-${{ hashFiles(format('{0}/pnpm-lock.yaml', inputs.working-directory)) }}
        restore-keys: |
          ${{ runner.os }}-node-${{ inputs.node-version }}-pnpm-

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        pnpm install --frozen-lockfile
        if [[ -n "${{ inputs.build-script }}" ]]; then
          pnpm run "${{ inputs.build-script }}"
        fi
